services:
  redis-primary:
    image: bitnami/redis:7.4
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_PASSWORD=demo-password
    ports:
      - "6379:6379"
    volumes:
      - primary_data:/bitnami/redis/data

  redis-replica:
    image: bitnami/redis:7.4
    depends_on:
      - redis-primary
    environment:
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis-primary
      - REDIS_MASTER_PASSWORD=demo-password
      - REDIS_PASSWORD=demo-password
    ports:
      - "6380:6379"
    volumes:
      - replica_data:/bitnami/redis/data
volumes:
  primary_data:
  replica_data:
